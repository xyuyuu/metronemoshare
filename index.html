<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>еҘҪеҸӢйҖҒжӮЁй«ҳзә§VIP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      justify-content: center;
      background: none; /* иғҢжҷҜж”ҫеҲ° container */
    }
    
    .container {
      width: 100%;
      max-width: 390px;
      min-height: 100vh; /* ж’‘ж»ЎеұҸе№• */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 60px 24px;
      background:
        url('img/bg-window.png') top center / 100% auto no-repeat,
        linear-gradient(180deg, #FFE2AC 0%, #ffffff 100%);
    }
    /* App Logo */
    .logo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ж ҮйўҳеҢә */
    .title {
      font-size: 22px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .title em {
      font-style: normal;
      color: #B5820A;
    }

    .subtitle {
      font-size: 12px;
      color: #7A6230;
      text-align: center;
      line-height: 1.7;
      padding: 0 8px;
      margin-bottom: 36px;
    }

    /* VIP еҚЎеӣҫ */
    .vip-card-wrap {
      width: 78%;
      max-width: 280px;
      margin-bottom: 44px;
      flex-shrink: 0;
    }

    .vip-card-wrap img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 12px 28px rgba(180, 120, 0, 0.30));
    }

    /* дёӢиҪҪжҢүй’® */
    .btn-download {
      width: 100%;
      max-width: 320px;
      height: 50px;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      background: #111;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
      outline: none;
      -webkit-appearance: none;
      flex-shrink: 0;
    }

    .btn-download .btn-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 28px;
      pointer-events: none;
    }

    .btn-download .btn-text {
      position: relative;
      z-index: 1;
      font-size: 18px;
      font-weight: 700;
      color: #FFE0A0;
      letter-spacing: 1px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    /* жҢүй’®зӮ№еҮ»жҖҒ */
    .btn-download:active {
      transform: scale(0.97);
      transition: transform 0.1s ease;
    }

    /* еә•йғЁз»ҹи®Ў */
    .stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
	  flex-shrink: 0; /* йҳІжӯўиў«еҺӢзј© */
    }

    .stat-value {
      font-size: 14px;
      font-weight: 800;
      color: #E19E36;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 12px;
      color: #E19E36;
      text-align: center;
      line-height: 1.4;
    }

    .stat-with-laurel {
      display: flex;
      align-items: center;
	   flex-direction: column;
      gap: 6px;
    }

    .stat-with-laurel .laurel {
      width: 16px;
      height: auto;
      flex-shrink: 0;
    }

    /* еӨҚеҲ¶жҲҗеҠҹжҸҗзӨә */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 14px;
      padding: 10px 22px;
      border-radius: 24px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- App Logo -->
    <div class="logo-wrap">
      <img src="img/logo.png" alt="иҠӮжӢҚеҷЁ Logo" />
    </div>

    <!-- ж Үйўҳ -->
    <h1 class="title">еҘҪеҸӢйҖҒжӮЁ1еӨ©<em>гҖҢй«ҳзә§VIPгҖҚ</em></h1>

    <!-- еүҜж Үйўҳ -->
    <p class="subtitle">
      и§Јй”Ғе…ЁеҘ—й«ҳдҝқзңҹйҹіиүІпјҢз»ҶеҲҶиҠӮжӢҚпјҢе‘ҠеҲ«е№ҝе‘Ҡжү“жү°<br />
      е°ұеңЁиҝҷж¬ҫеҚғдёҮз”ЁжҲ·йғҪеңЁз”Ёзҡ„зҘһд»ҷиҠӮжӢҚеҷЁ
    </p>

    <!-- VIP еҚЎеӣҫ -->
    <div class="vip-card-wrap">
      <img src="img/vip-card.png" alt="VIPеҚЎ" />
    </div>

    <!-- дёӢиҪҪжҢүй’® -->
    <button class="btn-download" id="btnDownload">
      <img class="btn-bg" src="img/btn-bg.png" alt="" />
      <span class="btn-text">з«ӢеҚідёӢиҪҪйўҶеҸ–VIP</span>
    </button>

    <!-- еә•йғЁз»ҹи®Ў -->
    <div class="stats">
      <div class="stat-item">
		  <img class="laurel" src="img/laurel-right.png" alt="" />
        <div class="stat-with-laurel">
          
          <div>
       <div class="stat-label">зҙҜи®Ўе®үиЈ…дёӢиҪҪйҮҸи¶…</div>
          </div>
         <div class="stat-value">1.4дәҝж¬Ў</div>
        </div>
         <img class="laurel" src="img/laurel-left.png" alt="" />
		  
      </div>

      <div class="stat-item">
		  <img class="laurel" src="img/laurel-right.png" alt="" />
        <div class="stat-with-laurel">
          <div>
         <div class="stat-label">е·ІжҢҒз»ӯдёәз”ЁжҲ·жңҚеҠЎ</div>
          </div>
         		  <div class="stat-value">6е№ҙ</div>
        </div>

		   <img class="laurel" src="img/laurel-left.png" alt="" />
      </div>
    </div>

  </div>

  <!-- еӨҚеҲ¶жҲҗеҠҹжҸҗзӨә -->
  <div class="toast" id="toast">е·ІеӨҚеҲ¶еҸЈд»ӨпјҢиҜ·еүҚеҫҖеә”з”Ёе•Ҷеә—йўҶеҸ–</div>

  <script>
    // =============================================
    // й…ҚзҪ®еҢәпјҡдҝ®ж”№иҝҷдёӨдёӘеҸҳйҮҸеҚіеҸҜ
    // =============================================

    // еҚҺдёәеә”з”ЁеёӮеңәй“ҫжҺҘ
    var APP_GALLERY_URL = 'store://appgallery.huawei.com/app/detail?id=com.liubowang.metronome.hm';

    // еӨҚеҲ¶еҲ°еүӘеҲҮжқҝзҡ„еҸЈд»ӨпјҲжӣҝжҚўдёәдҪ зҡ„зңҹе®һеҸЈд»Өпјү
    var KOULING_TEXT = 'metronemo_Share_1dayVIP';

    // =============================================

    function showToast(msg) {
      var toast = document.getElementById('toast');
      if (msg) toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function () {
        toast.classList.remove('show');
      }, 2500);
    }

    function copyToClipboard(text) {
      // дјҳе…ҲдҪҝз”ЁзҺ°д»Ј Clipboard API
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      // йҷҚзә§ж–№жЎҲпјҡеҲӣе»әдёҙж—¶ textarea
      return new Promise(function (resolve, reject) {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
          var success = document.execCommand('copy');
          document.body.removeChild(textarea);
          if (success) resolve();
          else reject(new Error('execCommand failed'));
        } catch (e) {
          document.body.removeChild(textarea);
          reject(e);
        }
      });
    }

    document.getElementById('btnDownload').addEventListener('click', function () {
      // е…ҲеӨҚеҲ¶еҸЈд»ӨпјҢеҶҚи·іиҪ¬
      copyToClipboard(KOULING_TEXT)
        .then(function () {
          showToast('еҸЈд»Өе·ІеӨҚеҲ¶пјҢеҚіе°ҶеүҚеҫҖеә”з”Ёе•Ҷеә—пҪһ');
        })
        .catch(function () {
          showToast('еҚіе°ҶеүҚеҫҖеә”з”Ёе•Ҷеә—пҪһ');
        })
        .finally(function () {
          setTimeout(function () {
            window.location.href = APP_GALLERY_URL;
          }, 800);
        });
    });
  </script>
</body>
</html>
