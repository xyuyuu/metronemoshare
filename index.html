<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>好友送您一天VIP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      justify-content: center;
      background: none;
    }

    .container {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 24px 60px 24px;
      background: url('img/mask-group.png') top center / 100% auto no-repeat,
                  linear-gradient(180deg, #D4F1F4 0%, #E8F8F5 25%, #ffffff 100%);
    }

    /* VIP 卡图（顶部） */
    .vip-card-wrap {
      width: 70%;
      max-width: 260px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .vip-card-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 中间留白，露出背景插图 */
    .spacer {
      flex: 0 0 230px;
    }

    /* App Logo */
    .logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 150, 136, 0.15);
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 副标题 */
    .subtitle {
      font-size: 13px;
      color: #546E7A;
      text-align: center;
      line-height: 1.8;
      padding: 0 12px;
      margin-bottom: 24px;
    }

    /* 下载按钮 */
    .btn-download {
      width: 80%;
      max-width: 300px;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      padding: 0;
      background: none;
      outline: none;
      -webkit-appearance: none;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.20);
    }

    .btn-download img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 28px;
    }

    /* 按钮点击态 */
    .btn-download:active {
      transform: scale(0.97);
      transition: transform 0.1s ease;
    }

    /* 复制成功提示 */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 14px;
      padding: 10px 22px;
      border-radius: 24px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- App Logo（顶部） -->
    <div class="logo-wrap">
      <img src="img/ic_launcher_round.png" alt="放大镜 Logo" />
    </div>

    <!-- 副标题 -->
    <p class="subtitle">
      解锁重点文字识别，1-20倍的放大效果，告别广告打扰，就在这款千万用户都在用的神仙放大镜
    </p>

    <!-- 中间留白，露出背景插图 -->
    <div class="spacer"></div>

    <!-- 好友送您一天VIP 卡图 -->
    <div class="vip-card-wrap">
      <img src="img/vip-card-magnifier.png" alt="好友送您一天VIP" />
    </div>

    <!-- 下载按钮 -->
    <button class="btn-download" id="btnDownload">
      <img src="img/bg-decoration.png" alt="立即下载领取VIP" />
    </button>

  </div>

  <!-- 复制成功提示 -->
  <div class="toast" id="toast">已复制口令，请前往应用商店领取</div>

  <script>
    // =============================================
    // 配置区：修改这两个变量即可
    // =============================================

    // 华为应用市场链接
    var APP_GALLERY_URL = 'store://appgallery.huawei.com/app/detail?id=com.liubowang.magnifier.hm';

    // 复制到剪切板的口令（替换为你的真实口令）
    var KOULING_TEXT = 'Magnifier_Share_1dayVIP';

    // =============================================

    function showToast(msg) {
      var toast = document.getElementById('toast');
      if (msg) toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function () {
        toast.classList.remove('show');
      }, 2500);
    }

    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise(function (resolve, reject) {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
          var success = document.execCommand('copy');
          document.body.removeChild(textarea);
          if (success) resolve();
          else reject(new Error('execCommand failed'));
        } catch (e) {
          document.body.removeChild(textarea);
          reject(e);
        }
      });
    }

    document.getElementById('btnDownload').addEventListener('click', function () {
      copyToClipboard(KOULING_TEXT)
        .then(function () {
          showToast('口令已复制，即将前往应用商店～');
        })
        .catch(function () {
          showToast('即将前往应用商店～');
        })
        .finally(function () {
          setTimeout(function () {
            window.location.href = APP_GALLERY_URL;
          }, 800);
        });
    });
  </script>
</body>
</html>
